<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fire" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#fff7a8"/>
      <stop offset="30%" stop-color="#ffc400"/>
      <stop offset="65%" stop-color="#ff4b00"/>
      <stop offset="100%" stop-color="#a60000"/>
    </radialGradient>

    <radialGradient id="core">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffe66b"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

  </defs>

  <!-- 発光 -->

<ellipse cx="200" cy="325" rx="105" ry="35"
    fill="#ff4b00" opacity="0.35" filter="url(#softGlow)"/>

  <!-- 外炎 -->

<path d="
    M200 355
    C150 355 118 310 130 265
    C140 225 175 205 160 155
    C190 180 205 115 220 75
    C235 145 285 185 270 235
    C315 270 280 355 200 355 Z"
    fill="url(#fire)"
  />

  <!-- 中央の炎 -->

<path d="
    M200 330
    C170 315 160 280 175 245
    C190 215 220 200 210 145
    C250 205 255 250 235 295
    C225 315 215 325 200 330 Z"
    fill="url(#core)"
  />

  <!-- ふつふつした熱の粒 -->
  <g fill="#fff3a1">
    <circle cx="170" cy="285" r="6">
      <animate attributeName="cy" values="285;255;285" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="270" r="5">
      <animate attributeName="cy" values="270;235;270" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="230" r="4">
      <animate attributeName="cy" values="230;195;230" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 小さな火の粉 -->
  <g fill="#ffd84d">
    <circle cx="145" cy="205" r="3"/>
    <circle cx="255" cy="190" r="3"/>
    <circle cx="165" cy="145" r="2"/>
    <circle cx="240" cy="130" r="2"/>
  </g>
</svg>
