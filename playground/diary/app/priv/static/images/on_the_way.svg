<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <linearGradient id="road" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="70" fill="url(#sky)"/>

  <!-- Moon / Destination -->
  <circle cx="430" cy="130" r="55" fill="#fef3c7"/>

  <!-- Mountain -->

<path d="M70 450 L300 160 L530 450 Z"
        fill="#334155"/>

<path d="M300 160 L390 450 L530 450 Z"
        fill="#1e293b"/>

  <!-- Snow peak -->

<path d="M300 160 L255 220 L300 205 L345 220 Z"
        fill="#f8fafc"/>

  <!-- Road -->

<path d="M300 600
           C295 520 265 470 285 420
           C310 360 360 330 335 260"
        fill="none"
        stroke="url(#road)"
        stroke-width="26"
        stroke-linecap="round"/>

  <!-- Person seen from behind -->
  <!-- Head -->
  <circle cx="285" cy="390" r="16" fill="#111827"/>

  <!-- Body / coat -->

<path d="M255 410
           C270 400 300 400 315 410
           L330 500
           C300 520 270 520 240 500
           Z"
        fill="#111827"/>

  <!-- Arms -->

<path d="M260 430 L220 480
           M310 430 L350 480"
        stroke="#111827"
        stroke-width="16"
        stroke-linecap="round"/>

  <!-- Legs -->

<path d="M270 500 L245 570
           M300 500 L330 570"
        stroke="#111827"
        stroke-width="18"
        stroke-linecap="round"/>

</svg>
